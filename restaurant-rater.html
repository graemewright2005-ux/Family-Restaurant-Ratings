<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Restaurant Reviews</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
            --text-main: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
        header { text-align: center; grid-column: 1 / -1; margin-bottom: 20px; }
        h1 { color: #fff; text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); margin-bottom: 5px; }
        h2 { color: var(--neon-pink); text-shadow: 0 0 5px rgba(255, 0, 255, 0.5); border-bottom: 1px solid var(--neon-pink); padding-bottom: 10px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 10px; border: 1px solid #333; box-shadow: 0 0 15px rgba(0, 243, 255, 0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; margin-bottom: 5px; color: #aaa; }
        input, select, textarea { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; transition: all 0.3s ease; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--neon-cyan); box-shadow: 0 0 8px rgba(0, 243, 255, 0.4); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { background: transparent; color: var(--neon-cyan); border: 1px solid var(--neon-cyan); padding: 10px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; width: 100%; }
        button:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }
        .btn-pink { color: var(--neon-pink); border-color: var(--neon-pink); }
        .btn-pink:hover { background: var(--neon-pink); color: #fff; box-shadow: 0 0 15px var(--neon-pink); }
        .btn-green { color: var(--neon-green); border-color: var(--neon-green); margin-top: 15px; }
        .btn-green:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }
        .diner-section { background: #252525; padding: 15px; border-radius: 5px; margin-bottom: 15px; border-left: 3px solid var(--neon-cyan); }
        .dish-row { display: grid; grid-template-columns: 2fr 2fr 3fr 1fr; gap: 10px; margin-top: 10px; align-items: end; background: #1a1a1a; padding: 10px; border-radius: 5px; border: 1px dashed #444; }
        .remove-btn { color: #ff4444; border-color: #ff4444; padding: 10px 5px; font-size: 12px; }
        .remove-btn:hover { background: #ff4444; box-shadow: 0 0 10px #ff4444; }
        .top-three { grid-column: 1 / -1; }
        .dashboard-controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; background: #222; padding: 10px; border-radius: 5px; }
        .winner-card { background: #222; border: 1px solid #333; border-left: 4px solid var(--neon-green); padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; transition: transform 0.2s; }
        .winner-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(57, 255, 20, 0.2); }
        .winner-rank { font-size: 24px; font-weight: bold; color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green); margin-right: 15px; }
        .history-item { border-bottom: 1px solid #333; padding: 15px 0; }
        .tag { background: #333; padding: 4px 10px; border-radius: 12px; font-size: 11px; color: var(--neon-cyan); border: 1px solid var(--neon-cyan); }
        #status-indicator { text-align: center; font-size: 12px; color: var(--neon-pink); margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>NEON BITES</h1>
        <p style="color: #888; margin-top: 0;">Live Family Tracker</p>
        <div id="status-indicator">Connecting to Database...</div>
    </header>

    <div class="card" style="grid-column: 1 / -1;">
        <h2>Add a New Visit</h2>
        <form id="reviewForm">
            <div class="grid-2">
                <div class="form-group"><label>Restaurant Name</label><input type="text" id="resName" required placeholder="Where did we eat?"></div>
                <div class="form-group"><label>Location</label><input type="text" id="resLocation" required placeholder="City or area"></div>
            </div>
            
            <div class="grid-2">
                <div class="form-group">
                    <label>Cuisine Type</label>
                    <select id="resType">
                        <option value="Italian">Italian</option>
                        <option value="Thai">Thai</option>
                        <option value="Portuguese">Portuguese</option>
                        <option value="Tapas">Tapas</option>
                        <option value="Indian">Indian</option>
                        <option value="British">British</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Value (1-10)</label><input type="number" id="rateValue" min="1" max="10" required></div>
                    <div class="form-group"><label>Ambiance (1-10)</label><input type="number" id="rateAmbiance" min="1" max="10" required></div>
                </div>
            </div>

            <div id="dinersContainer"></div>
            
            <div style="display: flex; gap: 10px;">
                <button type="button" class="btn-pink" onclick="window.addDiner()">+ Add Family Member</button>
                <button type="submit" class="btn-green" id="submitBtn">💾 Save to Cloud</button>
            </div>
        </form>
    </div>

    <div class="card">
        <h2>Recent Meals</h2>
        <div id="historyList"></div>
    </div>

    <div class="card top-three">
        <h2>🏆 Top 3 Leaderboard</h2>
        <div class="dashboard-controls">
            <label style="margin: 0; color: #fff;">Sort by:</label>
            <select id="sortFilter" style="width: 250px;">
                <option value="overall">Highest Overall Average</option>
                <option value="foodAvg">Best Food (Family Average)</option>
                <option value="value">Best Value</option>
                <option value="ambiance">Best Ambiance</option>
            </select>
        </div>
        <div id="top3List"></div>
    </div>
</div>

<script type="module">
    // 1. Import Firebase dependencies from CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // ==========================================
    // 🛑 STOP HERE: PASTE YOUR FIREBASE CONFIG
    // ==========================================
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_MESSAGING_ID",
        appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let reviews = [];

    // --- UI Dynamic Functions ---
    let dinerCount = 0;
    let dishCount = 0;

    window.addDiner = function() {
        dinerCount++;
        const dinerId = `diner-${dinerCount}`;
        const container = document.getElementById('dinersContainer');
        const html = `
            <div class="diner-section" id="${dinerId}">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <input type="text" class="diner-name" placeholder="Name (e.g., Dad, Daughter)" style="width: 40%; font-weight: bold; color: var(--neon-cyan); border:none; background: transparent; border-bottom: 1px solid var(--neon-cyan); border-radius: 0; padding: 5px;">
                    <button type="button" class="remove-btn" style="width: auto; padding: 5px 10px;" onclick="document.getElementById('${dinerId}').remove()">X</button>
                </div>
                <div id="dishes-${dinerId}"></div>
                <button type="button" style="font-size: 12px; padding: 5px; margin-top: 10px;" onclick="window.addDish('${dinerId}')">+ Add Dish</button>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', html);
        window.addDish(dinerId);
    };

    window.addDish = function(dinerId) {
        dishCount++;
        const dishId = `dish-${dishCount}`;
        const container = document.getElementById(`dishes-${dinerId}`);
        const html = `
            <div class="dish-row" id="${dishId}">
                <div>
                    <label>Course</label>
                    <select class="dish-course">
                        <option value="Starter">Starter</option><option value="Main">Main</option>
                        <option value="Dessert">Dessert</option><option value="Drink">Drink</option>
                    </select>
                </div>
                <div>
                    <label>Category</label>
                    <select class="dish-category">
                        <option value="Fish">Fish</option><option value="Meat">Meat</option>
                        <option value="Poultry">Poultry</option><option value="Vegetarian">Veg</option>
                        <option value="Sweet">Sweet</option><option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label>What was it?</label><input type="text" class="dish-desc" required>
                </div>
                <div style="display: flex; gap: 5px; align-items: flex-end;">
                    <div style="width: 100%;"><label>Score</label><input type="number" class="dish-score" min="1" max="10" required></div>
                    <button type="button" class="remove-btn" onclick="document.getElementById('${dishId}').remove()">X</button>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', html);
    };

    // Initialize with one diner
    window.addDiner();

    // --- Database Save Logic ---
    document.getElementById('reviewForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        document.getElementById('submitBtn').innerText = "Saving...";

        let dinersData = [];
        let totalFoodScore = 0;
        let foodItemCount = 0;

        document.querySelectorAll('.diner-section').forEach(dinerEl => {
            const dinerName = dinerEl.querySelector('.diner-name').value || "Anonymous";
            let dishes = [];
            dinerEl.querySelectorAll('.dish-row').forEach(dishEl => {
                const score = parseInt(dishEl.querySelector('.dish-score').value);
                dishes.push({
                    course: dishEl.querySelector('.dish-course').value,
                    category: dishEl.querySelector('.dish-category').value,
                    desc: dishEl.querySelector('.dish-desc').value,
                    score: score
                });
                totalFoodScore += score;
                foodItemCount++;
            });
            if(dishes.length > 0) dinersData.push({ name: dinerName, dishes: dishes });
        });

        const valueScore = parseInt(document.getElementById('rateValue').value);
        const ambianceScore = parseInt(document.getElementById('rateAmbiance').value);
        const foodAvg = foodItemCount > 0 ? (totalFoodScore / foodItemCount) : 0;
        const overallScore = parseFloat(((foodAvg + valueScore + ambianceScore) / 3).toFixed(1));

        const newReview = {
            name: document.getElementById('resName').value,
            location: document.getElementById('resLocation').value,
            type: document.getElementById('resType').value,
            scores: { value: valueScore, ambiance: ambianceScore },
            diners: dinersData,
            foodAvg: parseFloat(foodAvg.toFixed(1)),
            overall: overallScore,
            timestamp: serverTimestamp() // Tells Firebase to log exact time
        };

        try {
            await addDoc(collection(db, "reviews"), newReview);
            this.reset();
            document.getElementById('dinersContainer').innerHTML = '';
            window.addDiner();
        } catch (error) {
            console.error("Error adding document: ", error);
            alert("Error saving! Check console.");
        } finally {
            document.getElementById('submitBtn').innerText = "💾 Save to Cloud";
        }
    });

    // --- Real-Time Sync Logic ---
    const q = query(collection(db, "reviews"), orderBy("timestamp", "desc"));
    
    onSnapshot(q, (snapshot) => {
        reviews = [];
        snapshot.forEach((doc) => {
            reviews.push({ id: doc.id, ...doc.data() });
        });
        document.getElementById('status-indicator').innerText = "🟢 Live Connected to Firebase";
        document.getElementById('status-indicator').style.color = "var(--neon-green)";
        updateUI();
    }, (error) => {
        document.getElementById('status-indicator').innerText = "🔴 Disconnected / Setup Required";
        console.error("Firebase listen error:", error);
    });

    document.getElementById('sortFilter').addEventListener('change', updateUI);

    // --- Rendering UI ---
    function updateUI() {
        renderHistory();
        renderTop3();
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        if(reviews.length === 0) {
            list.innerHTML = '<p style="color:#888;">No data yet. Get eating!</p>';
            return;
        }

        reviews.slice(0, 5).forEach(rev => { // Only show latest 5
            let dishesPreview = '';
            if (rev.diners) {
                rev.diners.forEach(d => {
                    dishesPreview += `<span style="color:#888; font-size:12px;"><b>${d.name}:</b> ${d.dishes.length} items. </span>`;
                });
            }

            list.innerHTML += `
                <div class="history-item">
                    <strong style="color:var(--neon-pink); font-size: 18px;">${rev.name}</strong> 
                    <span class="tag">${rev.type}</span><br>
                    <div style="margin: 5px 0;">${dishesPreview}</div>
                    <small style="color:var(--neon-cyan);">Overall: ${rev.overall}/10 | Food Avg: ${rev.foodAvg}/10</small>
                </div>
            `;
        });
    }

    function renderTop3() {
        const list = document.getElementById('top3List');
        list.innerHTML = '';
        if(reviews.length === 0) {
            list.innerHTML = '<p style="color:#888;">Add reviews to see the leaderboard!</p>';
            return;
        }

        const criteria = document.getElementById('sortFilter').value;
        
        let sorted = [...reviews].sort((a, b) => {
            if (criteria === 'overall') return b.overall - a.overall;
            if (criteria === 'foodAvg') return b.foodAvg - a.foodAvg;
            if (criteria === 'value') return b.scores.value - a.scores.value;
            if (criteria === 'ambiance') return b.scores.ambiance - a.scores.ambiance;
        });

        sorted.slice(0, 3).forEach((rev, index) => {
            let scoreDisplay = '';
            if (criteria === 'overall') scoreDisplay = `${rev.overall}`;
            if (criteria === 'foodAvg') scoreDisplay = `${rev.foodAvg}`;
            if (criteria === 'value') scoreDisplay = `${rev.scores.value}`;
            if (criteria === 'ambiance') scoreDisplay = `${rev.scores.ambiance}`;

            list.innerHTML += `
                <div class="winner-card">
                    <div class="winner-rank">#${index + 1}</div>
                    <div style="flex-grow: 1;">
                        <h3 style="margin: 0; color: #fff;">${rev.name}</h3>
                        <small style="color: #888;">${rev.type} • ${rev.location}</small>
                    </div>
                    <div style="font-size: 24px; font-weight: bold; color: var(--neon-cyan); text-shadow: 0 0 5px var(--neon-cyan);">
                        ${scoreDisplay}
                    </div>
                </div>
            `;
        });
    }
</script>

</body>
</html>
